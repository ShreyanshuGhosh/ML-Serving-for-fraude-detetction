
name: CI/CD Pipeline

# ── When to run ───────────────────────────────────────────────
# Runs automatically on every push to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: Run Tests ────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest       # runs on GitHub's free Linux server

    steps:
      # Step 1 - Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Install Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # Step 3 - Install dependencies
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic
          pip install scikit-learn xgboost pandas numpy joblib

      # Step 4 - Run tests
      - name: Run tests
        run: |
          pip install pytest httpx
          pytest tests/ -v
        continue-on-error: true    # don't fail if no tests yet

  # ── JOB 2: Build and Push Docker Image ──────────────────────
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test                   # only runs if tests pass

    steps:
      # Step 1 - Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3 - Build and push image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detector:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detector:${{ github.sha }}

      # Step 4 - Print success message
      - name: Done
        run: |
          echo "Image pushed successfully!"
          echo "Tag: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detector:latest"